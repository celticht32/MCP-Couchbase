<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .bg { fill: #0a0c10; }
      .surface { fill: #111318; }
      .surface2 { fill: #181c24; }
      .border { stroke: #232838; fill: none; }
      .text { fill: #e8eaf0; }
      .text2 { fill: #8892aa; }
      .text3 { fill: #5a637a; }
      .accent { fill: #e8423a; }
      .ttl { font: 700 13px 'Syne', sans-serif; fill: #e8eaf0; }
      .sub { font: 400 10px 'Syne', sans-serif; fill: #5a637a; letter-spacing: 2px; }
      .nav { font: 500 12px 'Syne', sans-serif; fill: #e8eaf0; }
      .badge-txt { font: 600 10px 'DM Mono', monospace; fill: #fff; }
      .mono { font: 400 11px 'DM Mono', monospace; fill: #8892aa; }
      .mono-big { font: 400 12px 'DM Mono', monospace; fill: #e8eaf0; }
      .h1 { font: 800 24px 'Syne', sans-serif; fill: #e8eaf0; }
      .lead { font: 400 13px 'Syne', sans-serif; fill: #8892aa; }
    </style>
  </defs>

  <!-- Window chrome -->
  <rect class="bg" width="1200" height="720"/>

  <!-- Sidebar -->
  <rect class="surface" x="0" y="0" width="280" height="720"/>
  <line class="border" x1="280" y1="0" x2="280" y2="720"/>

  <!-- Sidebar header / logo -->
  <rect class="accent" x="20" y="20" width="32" height="32" rx="8"/>
  <text x="36" y="42" text-anchor="middle" class="badge-txt" font-size="14">CB</text>
  <text x="62" y="34" class="ttl">Couchbase</text>
  <text x="62" y="48" class="sub">MCP CONSOLE</text>

  <!-- Search -->
  <rect class="surface2" x="20" y="70" width="240" height="28" rx="6" stroke="#232838"/>
  <text x="33" y="88" class="mono" font-size="11">⌕</text>
  <text x="50" y="88" class="mono">Search tools…</text>

  <line class="border" x1="0" y1="115" x2="280" y2="115"/>

  <!-- Category list -->
  <g id="categories">
    <!-- Each row: dot + label + count badge -->
    <g transform="translate(0,130)">
      <rect fill="#38d9c0" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Data</text>
      <rect fill="#1a3a35" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#38d9c0">11</text>
    </g>
    <g transform="translate(0,156)">
      <rect fill="#9ccc65" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Diagnostics</text>
      <rect fill="#1a2a0d" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#9ccc65">11</text>
    </g>
    <g transform="translate(0,182)">
      <rect fill="#f0a500" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Buckets</text>
      <rect fill="#2d2400" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#f0a500">10</text>
    </g>
    <g transform="translate(0,208)">
      <rect fill="#c792ea" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Collections</text>
      <rect fill="#1f1530" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#c792ea">5</text>
    </g>
    <g transform="translate(0,234)">
      <rect fill="#26a69a" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Vector Indexes</text>
      <rect fill="#0d2a25" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#26a69a">2</text>
    </g>
    <g transform="translate(0,260)">
      <rect fill="#ff6b5e" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Security</text>
      <rect fill="#2d1a1a" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ff6b5e">20</text>
    </g>
    <g transform="translate(0,286)">
      <rect fill="#ef5350" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Encryption</text>
      <rect fill="#2a0d0d" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ef5350">4</text>
    </g>
    <g transform="translate(0,312)">
      <rect fill="#4fc3f7" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Cluster</text>
      <rect fill="#0d2030" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#4fc3f7">30</text>
    </g>
    <g transform="translate(0,338)">
      <rect fill="#fb8c00" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">XDCR</text>
      <rect fill="#2a1800" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#fb8c00">11</text>
    </g>
    <g transform="translate(0,364)">
      <rect fill="#69f0ae" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Indexes</text>
      <rect fill="#0d2a1a" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#69f0ae">6</text>
    </g>
    <g transform="translate(0,390)">
      <rect fill="#e040fb" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">FTS Admin</text>
      <rect fill="#1e0b2a" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#e040fb">9</text>
    </g>
    <g transform="translate(0,416)">
      <rect fill="#7986cb" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Transactions</text>
      <rect fill="#1a1a2a" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#7986cb">2</text>
    </g>
    <g transform="translate(0,442)">
      <rect fill="#ff8a65" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Eventing</text>
      <rect fill="#2a1812" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ff8a65">10</text>
    </g>
    <g transform="translate(0,468)">
      <rect fill="#8d6e63" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Backup</text>
      <rect fill="#1f1a17" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#8d6e63">5</text>
    </g>
    <g transform="translate(0,494)">
      <rect fill="#ba68c8" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Synonyms</text>
      <rect fill="#1f0d2a" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ba68c8">3</text>
    </g>
    <g transform="translate(0,520)">
      <rect fill="#ffd54f" x="20" y="6" width="6" height="6" rx="1"/>
      <text x="35" y="14" class="nav">Stats</text>
      <rect fill="#2a2000" x="245" y="2" width="20" height="14" rx="3"/>
      <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ffd54f">9</text>
    </g>
  </g>

  <!-- Bottom of sidebar: status pill -->
  <rect fill="#1a3a35" x="20" y="680" width="240" height="22" rx="11" stroke="#3dd68c" stroke-width="0.5"/>
  <circle fill="#3dd68c" cx="36" cy="691" r="3"/>
  <text x="48" y="695" class="mono" fill="#3dd68c" font-size="10">Connected · couchbase://localhost</text>

  <!-- Top bar -->
  <rect class="surface" x="280" y="0" width="920" height="56"/>
  <line class="border" x1="280" y1="56" x2="1200" y2="56"/>
  <text x="304" y="34" class="mono-big">148 tools</text>
  <text x="370" y="34" class="mono" font-size="11">across 16 categories</text>
  <circle fill="#181c24" cx="1144" cy="28" r="14" stroke="#232838"/>
  <text x="1144" y="33" text-anchor="middle" class="mono" font-size="12">⚙</text>
  <circle fill="#181c24" cx="1110" cy="28" r="14" stroke="#232838"/>
  <text x="1110" y="33" text-anchor="middle" class="mono" font-size="12">🕘</text>

  <!-- Welcome content -->
  <text x="320" y="160" class="h1">Browse and run Couchbase tools</text>
  <text x="320" y="190" class="lead">Pick a category from the sidebar, or search to filter. Tool forms are generated</text>
  <text x="320" y="210" class="lead">from each tool's JSON schema — boolean toggles, dropdowns for enums, JSON</text>
  <text x="320" y="230" class="lead">editors for nested objects.</text>

  <!-- Quick-action cards -->
  <g transform="translate(320,280)">
    <rect fill="#111318" stroke="#232838" width="240" height="120" rx="8"/>
    <text x="20" y="32" class="ttl">Quick health check</text>
    <text x="20" y="58" class="mono">cb_ping</text>
    <text x="20" y="80" class="mono" font-size="10">Verify SDK + service</text>
    <text x="20" y="93" class="mono" font-size="10">connectivity</text>
    <rect fill="#1a3a35" x="20" y="100" width="60" height="10" rx="5"/>
  </g>
  <g transform="translate(580,280)">
    <rect fill="#111318" stroke="#232838" width="240" height="120" rx="8"/>
    <text x="20" y="32" class="ttl">Find slow queries</text>
    <text x="20" y="58" class="mono" fill="#9ccc65">cb_perf_slowest_queries</text>
    <text x="20" y="80" class="mono" font-size="10">Phase 4 diagnostics —</text>
    <text x="20" y="93" class="mono" font-size="10">workload analysis</text>
    <rect fill="#1a2a0d" x="20" y="100" width="60" height="10" rx="5"/>
  </g>
  <g transform="translate(840,280)">
    <rect fill="#111318" stroke="#232838" width="240" height="120" rx="8"/>
    <text x="20" y="32" class="ttl">Multi-doc transaction</text>
    <text x="20" y="58" class="mono" fill="#7986cb">cb_transaction_run</text>
    <text x="20" y="80" class="mono" font-size="10">Phase 6b — ACID across</text>
    <text x="20" y="93" class="mono" font-size="10">multiple documents</text>
    <rect fill="#1a1a2a" x="20" y="100" width="60" height="10" rx="5"/>
  </g>
</svg>
