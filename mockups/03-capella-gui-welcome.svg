<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <style>
      .bg { fill: #0a0c10; }
      .surface { fill: #111318; }
      .surface2 { fill: #181c24; }
      .border { stroke: #232838; fill: none; }
      .ttl { font: 700 13px 'Syne', sans-serif; fill: #e8eaf0; }
      .sub { font: 400 10px 'Syne', sans-serif; fill: #5a637a; letter-spacing: 2px; }
      .nav { font: 500 12px 'Syne', sans-serif; fill: #e8eaf0; }
      .badge-txt { font: 600 10px 'DM Mono', monospace; fill: #fff; }
      .mono { font: 400 11px 'DM Mono', monospace; fill: #8892aa; }
      .mono-big { font: 400 12px 'DM Mono', monospace; fill: #e8eaf0; }
      .h1 { font: 800 24px 'Syne', sans-serif; fill: #e8eaf0; }
      .lead { font: 400 13px 'Syne', sans-serif; fill: #8892aa; }
      .label { font: 500 11px 'Syne', sans-serif; fill: #8892aa; letter-spacing: 1px; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>

  <!-- Sidebar (cyan accent, different from main GUI's red) -->
  <rect class="surface" x="0" y="0" width="280" height="720"/>
  <line class="border" x1="280" y1="0" x2="280" y2="720"/>

  <rect fill="#38d9c0" x="20" y="20" width="32" height="32" rx="8"/>
  <text x="36" y="42" text-anchor="middle" fill="#0a1f15" font-weight="700" font-size="14">CB</text>
  <text x="62" y="34" class="ttl">Couchbase</text>
  <text x="62" y="48" class="sub">CAPELLA v4 CONSOLE</text>

  <rect class="surface2" x="20" y="70" width="240" height="28" rx="6" stroke="#232838"/>
  <text x="33" y="88" class="mono" font-size="11">⌕</text>
  <text x="50" y="88" class="mono">Search tools…</text>

  <line class="border" x1="0" y1="115" x2="280" y2="115"/>

  <!-- Categories (only 6, all read-only) -->
  <g transform="translate(0,130)">
    <rect fill="#38d9c0" x="20" y="6" width="6" height="6" rx="1"/>
    <text x="35" y="14" class="nav">Organization</text>
    <rect fill="#0d2a25" x="245" y="2" width="20" height="14" rx="3"/>
    <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#38d9c0">6</text>
  </g>
  <g transform="translate(0,156)">
    <rect fill="#7986cb" x="20" y="6" width="6" height="6" rx="1"/>
    <text x="35" y="14" class="nav">Projects</text>
    <rect fill="#1a1a2a" x="245" y="2" width="20" height="14" rx="3"/>
    <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#7986cb">2</text>
  </g>
  <g transform="translate(0,182)">
    <rect fill="#4fc3f7" x="20" y="6" width="6" height="6" rx="1"/>
    <text x="35" y="14" class="nav">Clusters</text>
    <rect fill="#0d2030" x="245" y="2" width="20" height="14" rx="3"/>
    <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#4fc3f7">2</text>
  </g>
  <g transform="translate(0,208)">
    <rect fill="#ff6b5e" x="20" y="6" width="6" height="6" rx="1"/>
    <text x="35" y="14" class="nav">Database Users</text>
    <rect fill="#2d1a1a" x="245" y="2" width="20" height="14" rx="3"/>
    <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ff6b5e">2</text>
  </g>
  <g transform="translate(0,234)">
    <rect fill="#69f0ae" x="20" y="6" width="6" height="6" rx="1"/>
    <text x="35" y="14" class="nav">Allowed CIDRs</text>
    <rect fill="#0d2a1a" x="245" y="2" width="20" height="14" rx="3"/>
    <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#69f0ae">2</text>
  </g>
  <g transform="translate(0,260)">
    <rect fill="#ba68c8" x="20" y="6" width="6" height="6" rx="1"/>
    <text x="35" y="14" class="nav">App Services</text>
    <rect fill="#1f0d2a" x="245" y="2" width="20" height="14" rx="3"/>
    <text x="255" y="13" text-anchor="middle" class="badge-txt" fill="#ba68c8">2</text>
  </g>

  <!-- READ-ONLY banner -->
  <rect fill="#0d2a25" x="20" y="320" width="240" height="64" rx="6" stroke="#38d9c0" stroke-width="0.5"/>
  <text x="32" y="342" class="label" fill="#38d9c0">READ-ONLY</text>
  <text x="32" y="362" class="mono" font-size="10">16 inspection tools</text>
  <text x="32" y="376" class="mono" font-size="10">No writes from this GUI</text>

  <!-- Status pill -->
  <rect fill="#0d2a25" x="20" y="680" width="240" height="22" rx="11" stroke="#3dd68c" stroke-width="0.5"/>
  <circle fill="#3dd68c" cx="36" cy="691" r="3"/>
  <text x="48" y="695" class="mono" fill="#3dd68c" font-size="10">API key set · cloudapi.cloud.couchbase.com</text>

  <!-- Top bar -->
  <rect class="surface" x="280" y="0" width="920" height="56"/>
  <line class="border" x1="280" y1="56" x2="1200" y2="56"/>
  <text x="304" y="34" class="mono-big">16 tools</text>
  <text x="358" y="34" class="mono" font-size="11">across 6 categories · Capella v4</text>
  <rect fill="#181c24" x="1090" y="14" width="100" height="28" rx="14" stroke="#232838"/>
  <text x="1140" y="32" class="mono" font-size="10" text-anchor="middle">Port 5174</text>

  <!-- Welcome content -->
  <text x="320" y="170" class="h1">Capella v4 Control Plane</text>
  <text x="320" y="200" class="lead">Browse organizations, projects, clusters, database users, IP allowlists,</text>
  <text x="320" y="220" class="lead">and App Services across your Couchbase Capella deployments.</text>
  <text x="320" y="240" class="lead" fill="#5a637a">Authenticates via the API key secret you set in Capella → Settings → API Keys.</text>

  <!-- Hierarchy diagram -->
  <g transform="translate(320,290)">
    <text x="0" y="0" class="label">RESOURCE HIERARCHY</text>

    <rect fill="#0d2a25" x="0" y="20" width="160" height="40" rx="4" stroke="#38d9c0" stroke-width="0.5"/>
    <text x="80" y="38" text-anchor="middle" font-family="'Syne', sans-serif" font-weight="700" fill="#38d9c0" font-size="13">Organization</text>
    <text x="80" y="52" text-anchor="middle" class="mono" font-size="9" fill="#38d9c0">capella_organizations_list</text>

    <line stroke="#38d9c0" stroke-width="0.5" x1="80" y1="60" x2="80" y2="80"/>

    <rect fill="#1a1a2a" x="0" y="80" width="160" height="40" rx="4" stroke="#7986cb" stroke-width="0.5"/>
    <text x="80" y="98" text-anchor="middle" font-family="'Syne', sans-serif" font-weight="700" fill="#7986cb" font-size="13">Projects</text>
    <text x="80" y="112" text-anchor="middle" class="mono" font-size="9" fill="#7986cb">capella_projects_list</text>

    <line stroke="#7986cb" stroke-width="0.5" x1="80" y1="120" x2="80" y2="140"/>

    <rect fill="#0d2030" x="0" y="140" width="160" height="40" rx="4" stroke="#4fc3f7" stroke-width="0.5"/>
    <text x="80" y="158" text-anchor="middle" font-family="'Syne', sans-serif" font-weight="700" fill="#4fc3f7" font-size="13">Clusters</text>
    <text x="80" y="172" text-anchor="middle" class="mono" font-size="9" fill="#4fc3f7">capella_clusters_list</text>

    <line stroke="#4fc3f7" stroke-width="0.5" x1="80" y1="180" x2="80" y2="200"/>
    <line stroke="#4fc3f7" stroke-width="0.5" x1="80" y1="195" x2="280" y2="195"/>
    <line stroke="#4fc3f7" stroke-width="0.5" x1="80" y1="195" x2="-120" y2="195"/>

    <rect fill="#0d2a1a" x="-200" y="200" width="160" height="30" rx="4"/>
    <text x="-120" y="218" text-anchor="middle" class="mono" font-size="10" fill="#69f0ae">Allowed CIDRs</text>

    <rect fill="#2d1a1a" x="0" y="200" width="160" height="30" rx="4"/>
    <text x="80" y="218" text-anchor="middle" class="mono" font-size="10" fill="#ff6b5e">Database Users</text>

    <rect fill="#1f0d2a" x="200" y="200" width="160" height="30" rx="4"/>
    <text x="280" y="218" text-anchor="middle" class="mono" font-size="10" fill="#ba68c8">App Services</text>
  </g>

  <!-- Side note -->
  <g transform="translate(820,290)">
    <text x="0" y="0" class="label">GETTING STARTED</text>
    <text x="0" y="28" class="mono-big">1.</text>
    <text x="22" y="28" class="lead" font-size="12">Click ⚙ (top-right) →</text>
    <text x="22" y="44" class="lead" font-size="12">paste your API key secret</text>

    <text x="0" y="78" class="mono-big">2.</text>
    <text x="22" y="78" class="lead" font-size="12">Run capella_organizations_list</text>
    <text x="22" y="94" class="lead" font-size="12">to verify connectivity</text>

    <text x="0" y="128" class="mono-big">3.</text>
    <text x="22" y="128" class="lead" font-size="12">Copy the organizationId,</text>
    <text x="22" y="144" class="lead" font-size="12">walk down to projects → clusters</text>
  </g>
</svg>
