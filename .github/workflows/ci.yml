name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Run unit tests (no cluster required)
        run: uv run --python ${{ matrix.python-version }} pytest tests/ -m unit -v

      - name: Verify entry point + tool count
        env:
          CB_USERNAME: ci
          CB_PASSWORD: ci
        run: |
          uv run --python ${{ matrix.python-version }} python -c "
          import server, inspect
          assert callable(server.main)
          assert not inspect.iscoroutinefunction(server.main)
          assert len(server._RAW_TOOLS) == 167, f'Expected 167 tools, got {len(server._RAW_TOOLS)}'
          print(f'OK — {len(server._RAW_TOOLS)} tools, sync entry point verified')
          "

  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build distributions
        run: uv build

      - name: Inspect built artifacts
        run: |
          ls -la dist/
          python -m zipfile -l dist/*.whl | head -40

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
