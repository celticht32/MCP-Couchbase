<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Couchbase MCP Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0c10;
    --surface:   #111318;
    --surface2:  #181c24;
    --border:    #232838;
    --border2:   #2d3347;
    --accent:    #e8423a;
    --accent2:   #ff6b5e;
    --gold:      #f0a500;
    --cyan:      #38d9c0;
    --text:      #e8eaf0;
    --text2:     #8892aa;
    --text3:     #5a637a;
    --success:   #3dd68c;
    --warning:   #f0a500;
    --error:     #ff5c5c;
    --radius:    6px;
    --font-ui:   'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ── Layout ── */
  #root { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 20px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: white;
    letter-spacing: -1px; flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .logo-sub  { font-size: 10px; color: var(--text3); font-weight: 400; letter-spacing: 2px; text-transform: uppercase; }

  .search-wrap { position: relative; }
  .search-wrap input {
    width: 100%; padding: 7px 10px 7px 30px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-mono);
    font-size: 12px; outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 13px; }

  .nav-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
  .nav-group { margin-bottom: 4px; }
  .nav-group-label {
    padding: 8px 16px 4px;
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text3);
    display: flex; align-items: center; gap: 6px;
  }
  .nav-group-count {
    background: var(--surface2); color: var(--text3);
    border-radius: 10px; padding: 1px 6px; font-size: 9px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px; cursor: pointer;
    font-size: 12px; color: var(--text2);
    border-left: 2px solid transparent;
    transition: all .12s; user-select: none;
    font-family: var(--font-mono);
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active {
    background: rgba(232,66,58,.1);
    border-left-color: var(--accent);
    color: var(--text);
  }
  .nav-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: var(--border2);
  }
  .nav-item.active .nav-dot { background: var(--accent); }

  /* ── Config strip ── */
  .config-strip {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .config-btn {
    width: 100%; padding: 7px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text2);
    font-family: var(--font-ui); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; gap: 8px;
  }
  .config-btn:hover { border-color: var(--accent); color: var(--text); }
  .conn-status {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .conn-status.ok   { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .conn-status.err  { background: var(--error); }
  .conn-status.idle { background: var(--text3); }

  /* ── Main panel ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top bar ── */
  .topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .topbar-tool { font-size: 14px; font-weight: 700; }
  .topbar-desc { font-size: 12px; color: var(--text2); flex: 1; }
  .category-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }

  /* ── Content area ── */
  .content { flex: 1; display: flex; overflow: hidden; }

  /* ── Form panel ── */
  .form-panel {
    width: 360px; min-width: 320px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .form-scroll { flex: 1; overflow-y: auto; padding: 20px; }
  .form-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }

  .field { margin-bottom: 14px; }
  .field-label {
    font-size: 11px; font-weight: 600; color: var(--text2);
    margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
  }
  .required-mark { color: var(--accent); font-size: 10px; }
  .type-hint { color: var(--text3); font-size: 10px; font-family: var(--font-mono); }

  .field input, .field textarea, .field select {
    width: 100%; padding: 8px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font-mono); font-size: 12px; outline: none;
    transition: border-color .15s; resize: vertical;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field input::placeholder, .field textarea::placeholder { color: var(--text3); }
  .field textarea { min-height: 72px; }
  .field select { cursor: pointer; }
  .field select option { background: var(--surface2); }

  .bool-toggle {
    display: flex; gap: 6px;
  }
  .bool-btn {
    flex: 1; padding: 7px; border-radius: var(--radius);
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all .15s; text-align: center;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
  }
  .bool-btn.active-true  { background: rgba(61,214,140,.15); border-color: var(--success); color: var(--success); }
  .bool-btn.active-false { background: rgba(255,92,92,.12); border-color: var(--error); color: var(--error); }

  .form-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .run-btn {
    width: 100%; padding: 11px;
    background: var(--accent); border: none; border-radius: var(--radius);
    color: white; font-family: var(--font-ui); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .15s; letter-spacing: .5px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .run-btn:hover { background: var(--accent2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(232,66,58,.3); }
  .run-btn:active { transform: translateY(0); }
  .run-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .run-btn.loading { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

  /* ── Result panel ── */
  .result-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .result-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--text3);
    flex-shrink: 0; background: var(--surface);
  }
  .result-status {
    margin-left: auto; padding: 3px 10px; border-radius: 20px;
    font-size: 10px; font-weight: 700;
  }
  .result-status.ok  { background: rgba(61,214,140,.15); color: var(--success); }
  .result-status.err { background: rgba(255,92,92,.12); color: var(--error); }
  .result-time { color: var(--text3); font-family: var(--font-mono); }

  .result-scroll { flex: 1; overflow: auto; padding: 20px; }
  .result-empty {
    height: 100%; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px; color: var(--text3);
  }
  .result-empty-icon { font-size: 48px; opacity: .3; }
  .result-empty-text { font-size: 13px; }

  pre.result-json {
    font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
    color: var(--text); white-space: pre-wrap; word-break: break-word;
  }
  .json-key    { color: var(--cyan); }
  .json-str    { color: var(--success); }
  .json-num    { color: var(--gold); }
  .json-bool   { color: #c792ea; }
  .json-null   { color: var(--text3); }

  /* ── History strip ── */
  .history-strip {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 8px 20px; flex-shrink: 0;
    display: flex; gap: 8px; overflow-x: auto;
    align-items: center;
  }
  .history-label { font-size: 10px; color: var(--text3); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; flex-shrink: 0; }
  .history-chip {
    padding: 4px 10px; border-radius: 20px; flex-shrink: 0;
    font-family: var(--font-mono); font-size: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); cursor: pointer; transition: all .12s;
    display: flex; align-items: center; gap: 5px;
  }
  .history-chip:hover { border-color: var(--accent); color: var(--text); }
  .history-chip .hc-dot { width: 5px; height: 5px; border-radius: 50%; }
  .history-chip.ok  .hc-dot { background: var(--success); }
  .history-chip.err .hc-dot { background: var(--error); }

  /* ── Welcome screen ── */
  .welcome {
    flex: 1; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px; padding: 40px;
  }
  .welcome-logo { font-size: 64px; }
  .welcome-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
  .welcome-sub { font-size: 14px; color: var(--text2); text-align: center; max-width: 360px; line-height: 1.6; }
  .welcome-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    width: 100%; max-width: 560px; margin-top: 8px;
  }
  .welcome-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px;
    cursor: pointer; transition: all .15s;
  }
  .welcome-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .welcome-card-icon { font-size: 22px; margin-bottom: 6px; }
  .welcome-card-name { font-size: 12px; font-weight: 700; }
  .welcome-card-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── Config modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px; width: 480px; max-width: 95vw;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .modal-field label { display: block; font-size: 11px; color: var(--text2); font-weight: 600; margin-bottom: 5px; }
  .modal-field input {
    width: 100%; padding: 8px 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: var(--font-mono); font-size: 12px; outline: none;
    transition: border-color .15s;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-field.wide { grid-column: 1 / -1; }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-secondary {
    padding: 9px 18px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text2); font-family: var(--font-ui); font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }
  .btn-primary {
    padding: 9px 18px; background: var(--accent); border: none;
    border-radius: var(--radius); color: white;
    font-family: var(--font-ui); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .btn-primary:hover { background: var(--accent2); }

  /* ── Table view ── */
  .result-table { width: 100%; border-collapse: collapse; font-family: var(--font-mono); font-size: 12px; }
  .result-table th {
    text-align: left; padding: 8px 12px;
    background: var(--surface2); color: var(--text3);
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase; font-weight: 700;
    border-bottom: 1px solid var(--border); position: sticky; top: 0;
  }
  .result-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top; }
  .result-table tr:hover td { background: rgba(255,255,255,.02); }

  /* ── Spinner ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Constants ─────────────────────────────────────────────────────────────────
const API = window.location.origin; // same origin as Flask

// ── Auth layer ────────────────────────────────────────────────────────────────
// All fetch calls go through apiFetch(), which:
//   - injects Authorization: Bearer header when a CC token is available
//   - handles 401 by redirecting to /auth/login (Authorization Code flow)
//   - is a no-op passthrough when OAuth is disabled (oauth_enabled: false)

let _authState = null; // cached result of /auth/status

async function loadAuthState() {
  try {
    const r = await fetch(`${API}/auth/status`, { credentials: "include" });
    _authState = await r.json();
  } catch (e) {
    _authState = { oauth_enabled: false, authenticated: true };
  }
  return _authState;
}

async function apiFetch(url, opts = {}) {
  const state = _authState || await loadAuthState();

  // The browser GUI always authenticates via its session cookie (set during
  // the Authorization Code login). The Client Credentials flow (/auth/token)
  // is for external machine-to-machine callers hitting /api/* directly — it is
  // deliberately NOT used here, because minting a service-account token would
  // run the user's requests under the service identity instead of their own.
  const resp = await fetch(url, { ...opts, credentials: "include" });

  if (state.oauth_enabled && resp.status === 401) {
    // Session missing or expired — send the user through Authorization Code login.
    window.location.href =
      `${API}/auth/login?next=${encodeURIComponent(window.location.pathname)}`;
  }
  return resp;
}

const CATEGORY_CONFIG = {
  // Specific cb_ categories MUST come before generic Data (first prefix match wins)
  "Diagnostics":   { prefix: "cb_get_schema|cb_index_advisor|cb_explain|cb_perf_", color: "#9ccc65", icon: "◧", badge: "#1a2a0d" },
  "Transactions":  { prefix: "cb_transaction|cb_analytics", color: "#7986cb", icon: "◉", badge: "#1a1a2a" },
  "Synonyms":      { prefix: "cb_fts_synonym", color: "#ba68c8", icon: "≡", badge: "#1f0d2a" },

  // Generic cb_ catches everything else: ping/get/upsert/insert/replace/delete/get_multi/query/fts_search/lookup_in/mutate_in
  "Data":       { prefix: "cb_",                    color: "#38d9c0", icon: "◈", badge: "#1a3a35" },

  // admin_ groupings — Vector Indexes BEFORE Indexes is fine because prefixes don't overlap (admin_vector_index_ vs admin_index_)
  "Buckets":    { prefix: "admin_bucket_|admin_sample_buckets",           color: "#f0a500", icon: "◉", badge: "#2d2400" },
  "Collections":{ prefix: "admin_scope_|admin_collection_", color: "#c792ea", icon: "◫", badge: "#1f1530" },
  "Vector Indexes": { prefix: "admin_vector_index_", color: "#26a69a", icon: "⬡", badge: "#0d2a25" },
  "Security":   { prefix: "admin_user_|admin_group_|admin_role|admin_whoami|admin_audit|admin_password|admin_security", color: "#ff6b5e", icon: "◈", badge: "#2d1a1a" },
  "Encryption": { prefix: "admin_encryption_|admin_kmip_", color: "#ef5350", icon: "⏿", badge: "#2a0d0d" },
  "Cluster":    { prefix: "admin_cluster_|admin_node_|admin_rebalance|admin_failover|admin_autofailover|admin_recovery|admin_server_group|admin_logs|admin_autocompaction|admin_alerts", color: "#4fc3f7", icon: "◎", badge: "#0d2030" },
  "XDCR":       { prefix: "admin_xdcr_",            color: "#fb8c00", icon: "⇄", badge: "#2a1800" },
  "Indexes":    { prefix: "admin_index_",            color: "#69f0ae", icon: "◪", badge: "#0d2a1a" },
  "FTS Admin":  { prefix: "admin_fts_",              color: "#e040fb", icon: "◈", badge: "#1e0b2a" },
  "Eventing":   { prefix: "admin_eventing_",         color: "#ff8a65", icon: "λ", badge: "#2a1812" },
  "Backup":     { prefix: "admin_backup_",           color: "#8d6e63", icon: "▦", badge: "#1f1a17" },
  "Stats":      { prefix: "admin_stats_|admin_system_events|admin_node_self|admin_internal|admin_query_settings|admin_prometheus", color: "#ffd54f", icon: "◑", badge: "#2a2000" },
};

function categorize(toolName) {
  for (const [cat, cfg] of Object.entries(CATEGORY_CONFIG)) {
    const prefixes = cfg.prefix.split("|");
    if (prefixes.some(p => toolName.startsWith(p))) return cat;
  }
  return "Other";
}

// ── Syntax highlight JSON ─────────────────────────────────────────────────────
function highlightJSON(obj) {
  const str = JSON.stringify(obj, null, 2);
  return str
    .replace(/("(?:[^"\\]|\\.)*")(\s*:)/g, '<span class="json-key">$1</span>$2')
    .replace(/: "([^"]*)"/g, ': <span class="json-str">"$1"</span>')
    .replace(/: (-?\d+\.?\d*)/g, ': <span class="json-num">$1</span>')
    .replace(/: (true|false)/g, ': <span class="json-bool">$1</span>')
    .replace(/: null/g, ': <span class="json-null">null</span>');
}

// ── Result renderer ───────────────────────────────────────────────────────────
function ResultView({ result }) {
  if (!result) return (
    <div className="result-empty">
      <div className="result-empty-icon">⬡</div>
      <div className="result-empty-text">Run a tool to see results</div>
    </div>
  );

  const data = result.result;

  // Table if array of objects
  if (Array.isArray(data) && data.length > 0 && typeof data[0] === "object") {
    const keys = [...new Set(data.flatMap(r => Object.keys(r || {})))].slice(0, 12);
    return (
      <div style={{ overflowX: "auto" }}>
        <table className="result-table">
          <thead>
            <tr>{keys.map(k => <th key={k}>{k}</th>)}</tr>
          </thead>
          <tbody>
            {data.map((row, i) => (
              <tr key={i}>
                {keys.map(k => (
                  <td key={k}>
                    {typeof row[k] === "object"
                      ? <span style={{ color: "var(--text3)" }}>{JSON.stringify(row[k]).slice(0, 60)}</span>
                      : String(row[k] ?? "")}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  return (
    <pre className="result-json"
      dangerouslySetInnerHTML={{ __html: highlightJSON(data) }} />
  );
}

// ── Bool field ────────────────────────────────────────────────────────────────
function BoolField({ name, value, onChange }) {
  return (
    <div className="bool-toggle">
      {["true","false","(unset)"].map(v => (
        <button
          key={v}
          className={`bool-btn ${value === v ? (v === "true" ? "active-true" : v === "false" ? "active-false" : "") : ""}`}
          onClick={() => onChange(name, v === "(unset)" ? "" : v)}
        >{v}</button>
      ))}
    </div>
  );
}

// ── Tool Form ────────────────────────────────────────────────────────────────
function ToolForm({ tool, onRun, loading }) {
  const [values, setValues] = useState({});

  useEffect(() => { setValues({}); }, [tool?.name]);

  const props = tool?.inputSchema?.properties || {};
  const required = tool?.inputSchema?.required || [];

  const set = (k, v) => setValues(prev => ({ ...prev, [k]: v }));

  const handleRun = () => {
    const args = {};
    for (const [k, v] of Object.entries(values)) {
      if (v === "" || v === undefined) continue;
      const schema = props[k];
      if (!schema) { args[k] = v; continue; }
      if (schema.type === "integer" || schema.type === "number") {
        const n = Number(v);
        if (!isNaN(n)) args[k] = n;
      } else if (schema.type === "boolean") {
        args[k] = v === "true";
      } else if (schema.type === "object" || schema.type === "array") {
        try { args[k] = JSON.parse(v); } catch { args[k] = v; }
      } else {
        args[k] = v;
      }
    }
    onRun(args);
  };

  if (!tool) return null;

  const fieldEntries = Object.entries(props);

  return (
    <>
      <div className="form-scroll">
        <div className="form-title">Parameters</div>
        {fieldEntries.length === 0 && (
          <div style={{ color: "var(--text3)", fontSize: 12, fontFamily: "var(--font-mono)" }}>
            No parameters required
          </div>
        )}
        {fieldEntries.map(([name, schema]) => (
          <div className="field" key={name}>
            <div className="field-label">
              {name}
              {required.includes(name) && <span className="required-mark">*</span>}
              <span className="type-hint">{schema.type}</span>
            </div>
            {schema.type === "boolean" ? (
              <BoolField name={name} value={values[name] ?? ""} onChange={set} />
            ) : schema.type === "object" || schema.type === "array" ? (
              <textarea
                placeholder={schema.type === "array" ? '["val1","val2"]' : '{"key": "value"}'}
                value={values[name] ?? ""}
                onChange={e => set(name, e.target.value)}
                rows={4}
              />
            ) : schema.enum ? (
              <select value={values[name] ?? ""} onChange={e => set(name, e.target.value)}>
                <option value="">— select —</option>
                {schema.enum.map(v => <option key={v} value={v}>{v}</option>)}
              </select>
            ) : (
              <input
                type={schema.type === "integer" || schema.type === "number" ? "number" : "text"}
                placeholder={schema.description || name}
                value={values[name] ?? ""}
                onChange={e => set(name, e.target.value)}
              />
            )}
          </div>
        ))}
      </div>
      <div className="form-footer">
        <button
          className={`run-btn ${loading ? "loading" : ""}`}
          onClick={handleRun}
          disabled={loading}
        >
          {loading ? <div className="spinner" /> : "▶"}
          {loading ? "Running..." : `Execute ${tool.name}`}
        </button>
      </div>
    </>
  );
}

// ── Config Modal ────────────────────────────────────────────────────────────
function ConfigModal({ onClose, onSave }) {
  const [cfg, setCfg] = useState({});
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    apiFetch(`${API}/api/config`)
      .then(r => r.json())
      .then(setCfg)
      .catch(() => {});
  }, []);

  const set = (k, v) => setCfg(prev => ({ ...prev, [k]: v }));

  const save = async () => {
    setSaving(true);
    try {
      await apiFetch(`${API}/api/config`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(cfg),
      });
      onSave(cfg);
    } finally {
      setSaving(false);
    }
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-title">
          <span>⚙</span> Connection Settings
        </div>
        <div className="modal-grid">
          {[
            ["CB_CONNECTION_STRING","Connection String","couchbase://localhost","wide"],
            ["CB_USERNAME","Username","Administrator"],
            ["CB_PASSWORD","Password",""],
            ["CB_BUCKET","Default Bucket","default"],
            ["CB_SCOPE","Default Scope","_default"],
            ["CB_COLLECTION","Default Collection","_default"],
            ["CB_MGMT_PORT","Management Port","8091"],
          ].map(([key, label, placeholder, wide]) => (
            <div key={key} className={`modal-field${wide ? " wide" : ""}`}>
              <label>{label}</label>
              <input
                type={key === "CB_PASSWORD" ? "password" : "text"}
                placeholder={placeholder}
                value={cfg[key] ?? ""}
                onChange={e => set(key, e.target.value)}
              />
            </div>
          ))}
        </div>
        <div className="modal-btns">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary" onClick={save} disabled={saving}>
            {saving ? "Saving..." : "Apply & Reconnect"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [tools, setTools]         = useState([]);
  const [selected, setSelected]   = useState(null);
  const [result, setResult]       = useState(null);
  const [loading, setLoading]     = useState(false);
  const [history, setHistory]     = useState([]);
  const [search, setSearch]       = useState("");
  const [showConfig, setShowConfig] = useState(false);
  const [connStatus, setConnStatus] = useState("idle"); // idle | ok | err
  const [elapsed, setElapsed]     = useState(null);
  const [currentUser, setCurrentUser] = useState(null); // { email, name } | null

  // Load auth state, then tools
  useEffect(() => {
    loadAuthState().then(state => {
      if (state.oauth_enabled && !state.authenticated) {
        window.location.href = `${API}/auth/login?next=/`;
        return;
      }
      if (state.user) setCurrentUser(state.user);
      apiFetch(`${API}/api/tools`)
        .then(r => r.json())
        .then(data => setTools(data))
        .catch(() => setTools([]));
    });
  }, []);

  // Group tools by category
  const grouped = useMemo(() => {
    const filter = search.trim().toLowerCase();
    const out = {};
    for (const t of tools) {
      if (filter && !t.name.toLowerCase().includes(filter) && !t.description.toLowerCase().includes(filter)) continue;
      const cat = categorize(t.name);
      if (!out[cat]) out[cat] = [];
      out[cat].push(t);
    }
    return out;
  }, [tools, search]);

  const selectedTool = tools.find(t => t.name === selected);
  const selectedCat  = selected ? categorize(selected) : null;
  const catCfg       = selectedCat ? CATEGORY_CONFIG[selectedCat] : null;

  const runTool = useCallback(async (args) => {
    if (!selected) return;
    setLoading(true);
    setResult(null);
    const t0 = Date.now();
    try {
      const resp = await apiFetch(`${API}/api/call`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tool: selected, arguments: args }),
      });
      const data = await resp.json();
      const ms   = Date.now() - t0;
      setElapsed(ms);
      setResult(data);
      setConnStatus(data.ok ? "ok" : "err");
      setHistory(prev => [{ tool: selected, ok: data.ok, ms }, ...prev.slice(0, 9)]);
    } catch (e) {
      setResult({ ok: false, error: String(e) });
      setConnStatus("err");
    } finally {
      setLoading(false);
    }
  }, [selected]);

  const quickStart = [
    { icon: "⚡", name: "cb_ping",             desc: "Ping cluster" },
    { icon: "🪣", name: "admin_bucket_list",    desc: "List buckets" },
    { icon: "👤", name: "admin_user_list",      desc: "List users" },
    { icon: "🔍", name: "admin_cluster_info",   desc: "Cluster info" },
    { icon: "📊", name: "admin_node_list",      desc: "Node status" },
    { icon: "🔎", name: "cb_query",             desc: "SQL++ query" },
  ];

  return (
    <>
      <div id="root-inner" style={{ display: "flex", height: "100vh", overflow: "hidden" }}>
        {/* ── Sidebar ── */}
        <aside className="sidebar">
          <div className="sidebar-header">
            <div className="logo">
              <div className="logo-mark">CB</div>
              <div>
                <div className="logo-text">Couchbase</div>
                <div className="logo-sub">MCP Console</div>
              </div>
            </div>
            <div className="search-wrap">
              <span className="search-icon">⌕</span>
              <input
                placeholder="Search tools…"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
          </div>

          <nav className="nav-scroll">
            {Object.entries(grouped).map(([cat, catTools]) => (
              <div className="nav-group" key={cat}>
                <div className="nav-group-label">
                  <span>{CATEGORY_CONFIG[cat]?.icon || "◦"}</span>
                  {cat}
                  <span className="nav-group-count">{catTools.length}</span>
                </div>
                {catTools.map(t => (
                  <div
                    key={t.name}
                    className={`nav-item ${selected === t.name ? "active" : ""}`}
                    onClick={() => { setSelected(t.name); setResult(null); setElapsed(null); }}
                  >
                    <div className="nav-dot" />
                    {t.name}
                  </div>
                ))}
              </div>
            ))}
          </nav>

          <div className="config-strip">
            {currentUser && (
              <div style={{ display:"flex", alignItems:"center", gap:8, padding:"6px 0 8px", borderBottom:"1px solid var(--border)", marginBottom:8 }}>
                <span style={{ width:24, height:24, borderRadius:"50%", background:"var(--accent)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:"white", flexShrink:0 }}>
                  {(currentUser.name || currentUser.email || "?")[0].toUpperCase()}
                </span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:"var(--text)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                    {currentUser.name || currentUser.email}
                  </div>
                  {currentUser.name && currentUser.email && (
                    <div style={{ fontSize:10, color:"var(--text3)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                      {currentUser.email}
                    </div>
                  )}
                </div>
                <a href={`${API}/auth/logout`}
                   style={{ fontSize:10, color:"var(--text3)", textDecoration:"none", flexShrink:0, padding:"2px 6px", border:"1px solid var(--border)", borderRadius:4 }}
                   title="Sign out">
                  Sign out
                </a>
              </div>
            )}
            <button className="config-btn" onClick={() => setShowConfig(true)}>
              <span className={`conn-status ${connStatus}`} />
              Connection Settings
            </button>
          </div>
        </aside>

        {/* ── Main ── */}
        <main className="main">
          {!selected ? (
            <div className="welcome">
              <div className="welcome-logo">⬡</div>
              <div className="welcome-title">Couchbase MCP Console</div>
              <div className="welcome-sub">
                {tools.length} tools across {Object.keys(CATEGORY_CONFIG).length} categories.
                Select a tool from the sidebar or jump to a common operation:
              </div>
              <div className="welcome-grid">
                {quickStart.map(q => (
                  <div key={q.name} className="welcome-card"
                    onClick={() => setSelected(q.name)}>
                    <div className="welcome-card-icon">{q.icon}</div>
                    <div className="welcome-card-name">{q.name}</div>
                    <div className="welcome-card-desc">{q.desc}</div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <>
              {/* Top bar */}
              <div className="topbar">
                <div className="topbar-tool">{selected}</div>
                <div className="topbar-desc">{selectedTool?.description}</div>
                {catCfg && (
                  <span className="category-badge"
                    style={{ background: catCfg.badge, color: catCfg.color }}>
                    {selectedCat}
                  </span>
                )}
              </div>

              {/* Content */}
              <div className="content">
                {/* Form */}
                <div className="form-panel">
                  <ToolForm tool={selectedTool} onRun={runTool} loading={loading} />
                </div>

                {/* Result */}
                <div className="result-panel">
                  <div className="result-topbar">
                    Output
                    {elapsed !== null && (
                      <span className="result-time">{elapsed}ms</span>
                    )}
                    {result && (
                      <span className={`result-status ${result.ok ? "ok" : "err"}`}>
                        {result.ok ? "SUCCESS" : "ERROR"}
                      </span>
                    )}
                  </div>
                  <div className="result-scroll">
                    {result?.error && !result?.result && (
                      <pre className="result-json" style={{ color: "var(--error)" }}>
                        {String(result.error)}
                      </pre>
                    )}
                    <ResultView result={result} />
                  </div>
                </div>
              </div>

              {/* History */}
              {history.length > 0 && (
                <div className="history-strip">
                  <span className="history-label">Recent</span>
                  {history.map((h, i) => (
                    <div key={i}
                      className={`history-chip ${h.ok ? "ok" : "err"}`}
                      onClick={() => setSelected(h.tool)}
                    >
                      <span className="hc-dot" />
                      {h.tool}
                      <span style={{ color: "var(--text3)" }}>{h.ms}ms</span>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </main>
      </div>

      {showConfig && (
        <ConfigModal
          onClose={() => setShowConfig(false)}
          onSave={() => { setShowConfig(false); setConnStatus("idle"); }}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
